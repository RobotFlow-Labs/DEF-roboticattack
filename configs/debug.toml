# DEF-roboticattack — Debug/smoke test config (2 epochs, small dataset)

[training]
batch_size = 16
learning_rate = 0.001
epochs = 2
optimizer = "adamw"
weight_decay = 0.01
scheduler = "cosine"
warmup_steps = 10
precision = "fp16"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[model]
in_channels = 3
image_size = 224

[data]
num_train_samples = 256
num_val_samples = 64
patch_ratio_min = 0.01
patch_ratio_max = 0.20
attack_prob = 0.5
num_workers = 2
pin_memory = true

[checkpoint]
save_every_n_steps = 50
keep_top_k = 2
metric = "val_loss"
mode = "min"
save_dir = "/mnt/artifacts-datai/checkpoints/DEF-roboticattack-debug"

[early_stopping]
enabled = false
patience = 10
min_delta = 0.001

[logging]
log_dir = "/mnt/artifacts-datai/logs/DEF-roboticattack-debug"
log_every_n_steps = 10
